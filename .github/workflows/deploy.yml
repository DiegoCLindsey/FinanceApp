name: Deploy FinanceApp to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:              pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build V2 ──────────────────────────────────────────────────────────
      # .env.production sets VITE_BASE_URL=/FinanceApp/v2/ automatically
      - name: Build V2 (Vite)
        run: npm run build

      # ── 5. Inject Google Drive credentials into V1 ────────────────────────────
      - name: Inject Google Drive credentials
        env:
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: |
          if [ -n "$GDRIVE_CLIENT_ID" ] && [ -n "$GDRIVE_CLIENT_SECRET" ]; then
            echo "✅ Inyectando credenciales de Google Drive..."
            sed -i "s|%%GDRIVE_CLIENT_ID%%|${GDRIVE_CLIENT_ID}|g"         auth/auth.js
            sed -i "s|%%GDRIVE_CLIENT_SECRET%%|${GDRIVE_CLIENT_SECRET}|g" auth/auth.js
          else
            echo "⚠️  GDRIVE secrets no definidos. Desplegando sin Google Drive."
          fi

      # ── 6. Generate Firebase config from secrets ──────────────────────────────
      # El archivo generado (firebase/firebase-config.js) está en .gitignore y
      # NUNCA se commitea. Solo existe durante el build y en el artefacto desplegado.
      #
      # IMPORTANTE: para que Firebase Auth funcione desde GitHub Pages debes añadir
      # el dominio en Firebase Console → Authentication → Settings → Dominios autorizados:
      #   <usuario>.github.io   (o tu dominio personalizado)
      - name: Generate Firebase config
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [ -n "$FIREBASE_API_KEY" ] && [ -n "$FIREBASE_PROJECT_ID" ]; then
            echo "✅ Generando firebase/firebase-config.js desde secrets..."
            cat > firebase/firebase-config.js << 'JSEOF'
          window.FIREBASE_CONFIG = {
            apiKey:            "FIREBASE_API_KEY_VALUE",
            authDomain:        "FIREBASE_AUTH_DOMAIN_VALUE",
            projectId:         "FIREBASE_PROJECT_ID_VALUE",
            storageBucket:     "FIREBASE_STORAGE_BUCKET_VALUE",
            messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID_VALUE",
            appId:             "FIREBASE_APP_ID_VALUE",
          };
          JSEOF
            sed -i "s|FIREBASE_API_KEY_VALUE|${FIREBASE_API_KEY}|g"                         firebase/firebase-config.js
            sed -i "s|FIREBASE_AUTH_DOMAIN_VALUE|${FIREBASE_AUTH_DOMAIN}|g"                 firebase/firebase-config.js
            sed -i "s|FIREBASE_PROJECT_ID_VALUE|${FIREBASE_PROJECT_ID}|g"                   firebase/firebase-config.js
            sed -i "s|FIREBASE_STORAGE_BUCKET_VALUE|${FIREBASE_STORAGE_BUCKET}|g"           firebase/firebase-config.js
            sed -i "s|FIREBASE_MESSAGING_SENDER_ID_VALUE|${FIREBASE_MESSAGING_SENDER_ID}|g" firebase/firebase-config.js
            sed -i "s|FIREBASE_APP_ID_VALUE|${FIREBASE_APP_ID}|g"                           firebase/firebase-config.js
            echo "   Proyecto: ${FIREBASE_PROJECT_ID}"
          else
            echo "⚠️  FIREBASE secrets no definidos. La config deberá introducirse manualmente en la UI."
          fi

      # ── 7. Assemble _site/ (V1 at root + V2 at /v2/) ─────────────────────────
      - name: Assemble deploy site
        run: |
          mkdir -p _site/v2

          # V1: copy everything except tooling dirs
          # Nota: firebase/firebase-config.js (generado en paso 6) SÍ se incluye
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='dist' \
            --exclude='coverage' \
            --exclude='_site' \
            --exclude='.env*' \
            . _site/

          # V2: copy build output (use -a + trailing dot to avoid glob issues)
          cp -a dist/. _site/v2/

          # Verify Firebase config was included (warns if secrets not set)
          if [ -f _site/firebase/firebase-config.js ]; then
            echo "✅ firebase-config.js incluido en el despliegue"
          else
            echo "⚠️  firebase-config.js NO incluido (secrets no definidos)"
          fi

          echo "=== _site/v2/ contents ==="
          ls -la _site/v2/

      # ── 8. Upload & deploy ────────────────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
