name: Deploy FinanceApp to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:              pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build V2 ──────────────────────────────────────────────────────────
      # .env.production sets VITE_BASE_URL=/FinanceApp/v2/ automatically
      - name: Build V2 (Vite)
        run: npm run build

      # ── 5. Inject Google Drive credentials into V1 ────────────────────────────
      - name: Inject Google Drive credentials
        env:
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: |
          if [ -n "$GDRIVE_CLIENT_ID" ] && [ -n "$GDRIVE_CLIENT_SECRET" ]; then
            echo "✅ Inyectando credenciales de Google Drive..."
            sed -i "s|%%GDRIVE_CLIENT_ID%%|${GDRIVE_CLIENT_ID}|g"         auth/auth.js
            sed -i "s|%%GDRIVE_CLIENT_SECRET%%|${GDRIVE_CLIENT_SECRET}|g" auth/auth.js
          else
            echo "⚠️  GDRIVE secrets no definidos. Desplegando sin Google Drive."
          fi

      # ── 6. Assemble _site/ (V1 at root + V2 at /v2/) ─────────────────────────
      - name: Assemble deploy site
        run: |
          mkdir -p _site/v2

          # V1: copy everything except tooling dirs
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='dist' \
            --exclude='coverage' \
            --exclude='_site' \
            --exclude='.env*' \
            . _site/

          # V2: Vite build output
          cp -r dist/* _site/v2/

      # ── 7. Upload & deploy ────────────────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
